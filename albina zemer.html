<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Dua Albina</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    h1 {
        position: absolute;
        width: 100%;
        text-align: center;
        top: 50%;
        transform: translateY(-50%);
        
        /* Responsive text */
        font-size: clamp(28px, 8vw, 60px);

        color: #fff;
        z-index: 2;

        /* Glow effect */
        text-shadow: 
            0 0 10px #ff4d6d,
            0 0 20px #ff4d6d,
            0 0 40px #ff1a4d,
            0 0 80px #ff1a4d;

        animation: glow 2s ease-in-out infinite alternate;
        padding: 0 10px;
    }

    @keyframes glow {
        from {
            text-shadow: 
                0 0 10px #ff4d6d,
                0 0 20px #ff4d6d,
                0 0 40px #ff1a4d;
        }
        to {
            text-shadow: 
                0 0 20px #fff,
                0 0 30px #ff4d6d,
                0 0 60px #ff1a4d,
                0 0 100px #ff1a4d;
        }
    }

    .heart {
        position: absolute;
        width: 18px;
        height: 18px;
        background: rgba(255, 0, 80, 0.8);
        transform: rotate(45deg);
        animation: float linear infinite;
        border-radius: 3px;
    }

    .heart::before,
    .heart::after {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        background: rgba(255, 0, 80, 0.8);
        border-radius: 50%;
    }

    .heart::before {
        top: -9px;
        left: 0;
    }

    .heart::after {
        left: -9px;
        top: 0;
    }

    @keyframes float {
        0% {
            transform: translateY(100vh) rotate(45deg);
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh) rotate(45deg);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<h1>Te dua Albina jeme ❤️</h1>

<script>
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
        heart.style.opacity = Math.random();

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 7000);
    }

    setInterval(createHeart, 180);
</script>

</body>
</html>
